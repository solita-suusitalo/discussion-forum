name: Deploy Backend to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    permissions:
      contents: read

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            backend/dist
            backend/node_modules
            backend/package.json
            backend/prisma/schema.prisma

  # ── 2. MIGRATE ──────────────────────────────────────────────────────────────
  # Applies pending migrations to the production database BEFORE the new
  # app version is deployed. If this fails, deployment is blocked.
  migrate:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run production migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 3. DEPLOY ───────────────────────────────────────────────────────────────
  # Deploys the compiled app with production-only dependencies.
  deploy:
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "santeri-discussion-forum-backend"
          slot-name: "Production"
          package: backend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F282645F4971494D985B600F9E0B1214 }}
