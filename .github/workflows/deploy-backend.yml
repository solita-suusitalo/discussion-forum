name: Deploy Backend to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [azure-deployment]
  workflow_dispatch:

jobs:
  # ── 1. TEST & BUILD IMAGE ────────────────────────────────────────────────────
  # Runs lint, tests, and TypeScript build inside Docker's builder stage,
  # then pushes the production image to ACR. Only runs if tests pass.
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Build TypeScript
        run: npm run build

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: discforum.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: discforum.azurecr.io/backend:latest

  # ── 2. MIGRATE ───────────────────────────────────────────────────────────────
  # Applies pending migrations to the production database before the new
  # image is pulled by App Service. Runs in parallel with build-and-push.
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run production migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
